<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>まほうのふだ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 背景デコ -->
  <div class="bg-deco" aria-hidden="true">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div class="bubble b5"></div>
    <div class="star s1">✦</div>
    <div class="star s2">✦</div>
    <div class="star s3">✦</div>
    <div class="star s4">★</div>
  </div>

  <!-- スタート画面 -->
  <div id="start-screen">
    <div class="start-emoji">🪄</div>
    <h1 class="start-title">まほうの<br>ふだ</h1>
    <p class="start-desc">すきなふだをえらんで<br>スマホを<strong>うえに ふりあげよう！</strong></p>
    <button id="start-btn"><span>はじめる</span></button>
  </div>

  <!-- メイン画面（カード選択） -->
  <div id="main-screen">
    <div id="state-label" class="state-label">ふだをえらんでね</div>

    <!-- カードカルーセル（scroll-snapで中央揃え） -->
    <div class="card-carousel">
      <div id="card-track" class="card-track">
        <!-- script.js が variants.js を読んで自動生成 -->
      </div>
      <div id="dot-indicator" class="dot-indicator"></div>
    </div>

    <div id="hint" class="hint">タップして ふだをえらぼう！</div>
  </div>

  <!-- 全画面オーバーレイ（カード選択後） -->
  <div id="fullscreen-overlay">
    <button id="fullscreen-close">✕</button>
    <div id="fullscreen-label" class="state-label">ふだをえらんでね</div>
    <div id="fullscreen-card">
      <svg id="fullscreen-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="fullscreen-hint" class="hint">⬆️ うえに ふりあげよう！</div>
  </div>

  <!-- フラッシュ -->
  <div id="flash"></div>

  <script src="variants.js"></script>
  <script src="script.js"></script>
</body>
</html>
