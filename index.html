<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>振り上げデモ</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: #eee;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100svh;
    overflow: hidden;
    user-select: none;
  }

  #start-screen, #main-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    padding: 24px;
    box-sizing: border-box;
  }

  #main-screen { display: none; }

  button {
    padding: 14px 32px;
    font-size: 18px;
    background: #333;
    color: #eee;
    border: 1px solid #555;
    border-radius: 6px;
    cursor: pointer;
  }

  /* 絵エリア */
  #picture {
    width: min(80vw, 320px);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #444;
    border-radius: 8px;
    background: #1a1a1a;
    transition: background 0.3s;
  }

  #picture svg {
    width: 80%;
    height: 80%;
  }

  /* 状態表示 */
  #info {
    font-size: 13px;
    color: #888;
    text-align: center;
    line-height: 1.8;
  }

  #state-label {
    font-size: 16px;
    color: #aaa;
  }

  /* ゲージ */
  #gauge-wrap {
    width: 200px;
    height: 6px;
    background: #333;
    border-radius: 3px;
    overflow: hidden;
  }
  #gauge {
    height: 100%;
    width: 0%;
    background: #69f;
    border-radius: 3px;
    transition: width 0.08s;
  }

  #hint {
    font-size: 13px;
    color: #666;
  }
</style>
</head>
<body>

<!-- スタート画面 -->
<div id="start-screen">
  <p style="text-align:center;color:#999;font-size:14px">
    センサー許可のため<br>ボタンを押してください
  </p>
  <button id="start-btn">開始</button>
</div>

<!-- メイン画面 -->
<div id="main-screen">

  <div id="state-label">変化前（バリアントA）</div>

  <!-- 絵エリア -->
  <div id="picture">
    <svg id="pic-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- ゲージ -->
  <div id="gauge-wrap"><div id="gauge"></div></div>

  <div id="info">
    Z加速度: <span id="z-disp">0.00</span><br>
    傾き: <span id="tilt-disp">0.0</span>°
  </div>

  <div id="hint">上に強く振り上げてください</div>

  <!-- バリアント切替（デバッグ） -->
  <div style="display:flex;gap:8px;margin-top:4px">
    <button style="font-size:12px;padding:6px 12px" data-v="0">絵A</button>
    <button style="font-size:12px;padding:6px 12px" data-v="1">絵B</button>
    <button style="font-size:12px;padding:6px 12px" data-v="2">絵C</button>
    <button style="font-size:12px;padding:6px 12px" id="reset-btn">リセット</button>
  </div>

</div>

<script>
// ============================================================
// 絵の定義（プレースホルダーSVG）
// ============================================================
const BEFORE = [
  // A: 同心円 + 十字
  {
    label: '変化前（A）',
    svg: `
      <circle cx="50" cy="50" r="45" fill="none" stroke="#557" stroke-width="1" stroke-dasharray="5 3"/>
      <circle cx="50" cy="50" r="30" fill="none" stroke="#669" stroke-width="1"/>
      <circle cx="50" cy="50" r="14" fill="#334" stroke="#88a" stroke-width="1"/>
      <line x1="50" y1="5" x2="50" y2="95" stroke="#446" stroke-width="0.8"/>
      <line x1="5" y1="50" x2="95" y2="50" stroke="#446" stroke-width="0.8"/>
      <circle cx="50" cy="50" r="3" fill="#aac"/>
    `
  },
  // B: 四角 + ダイヤ
  {
    label: '変化前（B）',
    svg: `
      <rect x="8" y="8" width="84" height="84" fill="none" stroke="#557" stroke-width="1"/>
      <rect x="20" y="20" width="60" height="60" fill="none" stroke="#669" stroke-width="0.8" transform="rotate(45 50 50)"/>
      <rect x="36" y="36" width="28" height="28" fill="#334" stroke="#88a" stroke-width="1"/>
      <circle cx="50" cy="50" r="4" fill="#aac"/>
    `
  },
  // C: 五芒星
  {
    label: '変化前（C）',
    svg: `
      <circle cx="50" cy="50" r="46" fill="none" stroke="#557" stroke-width="1" stroke-dasharray="4 3"/>
      <polygon points="50,6 61,36 93,36 68,55 78,87 50,68 22,87 32,55 7,36 39,36"
        fill="#334" stroke="#88a" stroke-width="1"/>
      <circle cx="50" cy="50" r="4" fill="#aac"/>
    `
  }
];

const AFTER = {
  label: '変化後（魔法陣）',
  bg: '#0d0d1a',
  svg: `
    <style>
      @keyframes spin  { from{transform-origin:50px 50px;transform:rotate(0deg)}  to{transform-origin:50px 50px;transform:rotate(360deg)} }
      @keyframes rspin { from{transform-origin:50px 50px;transform:rotate(0deg)}  to{transform-origin:50px 50px;transform:rotate(-360deg)} }
      .r1 { animation: spin  7s linear infinite; }
      .r2 { animation: rspin 4s linear infinite; }
    </style>
    <g class="r1">
      <circle cx="50" cy="50" r="46" fill="none" stroke="#80f" stroke-width="0.8" stroke-dasharray="4 3"/>
      <line x1="50" y1="4" x2="50" y2="12" stroke="#c8f" stroke-width="1.5"/>
      <line x1="50" y1="88" x2="50" y2="96" stroke="#c8f" stroke-width="1.5"/>
      <line x1="4" y1="50" x2="12" y2="50" stroke="#c8f" stroke-width="1.5"/>
      <line x1="88" y1="50" x2="96" y2="50" stroke="#c8f" stroke-width="1.5"/>
    </g>
    <g class="r2">
      <circle cx="50" cy="50" r="34" fill="none" stroke="#60c" stroke-width="0.6" stroke-dasharray="2 4"/>
      <polygon points="50,17 67,46 67,68 50,83 33,68 33,46" fill="none" stroke="#b0f" stroke-width="0.8"/>
      <polygon points="50,83 33,54 33,32 50,17 67,32 67,54" fill="none" stroke="#70a" stroke-width="0.6" transform="rotate(30 50 50)"/>
    </g>
    <circle cx="50" cy="50" r="18" fill="rgba(80,0,160,0.2)" stroke="#70b" stroke-width="0.8"/>
    <circle cx="50" cy="50" r="6" fill="#d0f" opacity="0.8"/>
    <circle cx="50" cy="50" r="2" fill="white"/>
  `
};

// ============================================================
// 状態
// ============================================================
let variantIdx = 0;
let isAfter    = false;
let animating  = false;

const picture    = document.getElementById('picture');
const picSvg     = document.getElementById('pic-svg');
const stateLabel = document.getElementById('state-label');
const zDisp      = document.getElementById('z-disp');
const tiltDisp   = document.getElementById('tilt-disp');
const gauge      = document.getElementById('gauge');
const hint       = document.getElementById('hint');

function renderBefore(idx) {
  const v = BEFORE[idx];
  picSvg.innerHTML = v.svg;
  picture.style.background = '#1a1a1a';
  stateLabel.textContent = v.label;
}

function renderAfter() {
  picSvg.innerHTML = AFTER.svg;
  picture.style.background = AFTER.bg;
  stateLabel.textContent = AFTER.label;
}

renderBefore(0);

// ============================================================
// 切替
// ============================================================
function switchToAfter() {
  if (isAfter || animating) return;
  animating = true;
  picture.style.opacity = '0';
  picture.style.transition = 'opacity 0.15s';
  setTimeout(() => {
    renderAfter();
    picture.style.opacity = '1';
    isAfter   = true;
    animating = false;
    hint.textContent = 'タップで元に戻す';
  }, 160);
}

function switchToBefore() {
  if (!isAfter || animating) return;
  animating = true;
  picture.style.opacity = '0';
  setTimeout(() => {
    renderBefore(variantIdx);
    picture.style.opacity = '1';
    isAfter   = false;
    animating = false;
    hint.textContent = '上に強く振り上げてください';
  }, 160);
}

picture.addEventListener('click', () => { if (isAfter) switchToBefore(); });
document.getElementById('reset-btn').addEventListener('click', switchToBefore);

document.querySelectorAll('[data-v]').forEach(btn => {
  btn.addEventListener('click', () => {
    variantIdx = parseInt(btn.dataset.v);
    if (!isAfter) renderBefore(variantIdx);
  });
});

// PCテスト用
document.addEventListener('keydown', e => {
  if (e.code === 'Space') isAfter ? switchToBefore() : switchToAfter();
});

// ============================================================
// 加速度センサー
// ============================================================
const THRESHOLD   = 18;   // 振りのしきい値（大きいほど強い振りが必要）
const TILT_LIMIT  = 40;   // 傾き許容角（度）。画面が上向きじゃないと検知しない
const COOLDOWN_MS = 1200; // 連続検知防止（ミリ秒）

let lastTrigger = 0;

function onMotion(e) {
  const a = e.accelerationIncludingGravity;
  if (!a) return;

  const ax = a.x || 0;
  const ay = a.y || 0;
  const az = a.z || 0;

  // 傾き計算（画面が上を向いているか）
  const tilt = Math.atan2(Math.sqrt(ax * ax + ay * ay), Math.abs(az)) * 180 / Math.PI;

  zDisp.textContent    = az.toFixed(2);
  tiltDisp.textContent = tilt.toFixed(1);

  // ゲージ（z値がしきい値に対してどのくらいか）
  gauge.style.width = Math.min(100, Math.abs(az) / THRESHOLD * 100) + '%';

  if (isAfter) return;

  const now = Date.now();
  if (now - lastTrigger < COOLDOWN_MS) return;
  if (tilt > TILT_LIMIT) return;  // 傾きすぎは無視

  if (az > THRESHOLD) {
    lastTrigger = now;
    switchToAfter();
  }
}

// ============================================================
// 開始ボタン
// ============================================================
document.getElementById('start-btn').addEventListener('click', async () => {
  // iOS13+ の許可ダイアログ
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const result = await DeviceMotionEvent.requestPermission();
      if (result !== 'granted') {
        alert('センサーの使用を許可してください');
        return;
      }
    } catch (err) {
      alert('エラー: ' + err);
      return;
    }
  }

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('main-screen').style.display  = 'flex';
  window.addEventListener('devicemotion', onMotion);
});
</script>
</body>
</html>
