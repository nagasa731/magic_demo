<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>振り上げデモ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- スタート画面 -->
  <div id="start-screen">
    <p style="text-align:center;color:#999;font-size:14px">
      センサー許可のため<br>ボタンを押してください
    </p>
    <button id="start-btn">開始</button>
  </div>

  <!-- メイン画面 -->
  <div id="main-screen">

    <div id="state-label">変化前</div>

    <!-- 絵エリア -->
    <div id="picture">
      <svg id="pic-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <!-- 振りゲージ -->
    <div id="gauge-wrap"><div id="gauge"></div></div>

    <!-- センサー数値（デバッグ用） -->
    <div id="info">
      Z加速度: <span id="z-disp">0.00</span><br>
      傾き: <span id="tilt-disp">0.0</span>°
    </div>

    <div id="hint">上に強く振り上げてください</div>

    <!-- バリアント切替ボタン（script.js が variants.js を読んで自動生成） -->
    <div id="debug-buttons"></div>

  </div>

  <!-- 絵の定義（variants.js）を先に読み込んでから script.js を読む -->
  <script src="variants.js"></script>
  <script src="script.js"></script>

</body>
</html>
